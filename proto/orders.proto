syntax = "proto3";

package orders;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "../pb";

message OrderItem {
  uint64 product_id = 1;
  uint32 quantity = 2;
}

message GetOrderByIDRequest {
  string id = 1;
}

message GetOrderByIDResponse {
  string id = 1;
  string customer_id = 2;
  string rzp_id = 3;
  repeated OrderItem order_items = 4;
  string address = 5;
  string pincode = 6;
  double checkout_total = 7;
  string currency = 8;
  bool is_paid = 9;
  bool is_delivered = 10;
}

message GetOrdersByCustomerIDRequest {
  string customer_id = 1;
}

message GetOrdersByCustomerIDResponse {
  string id = 1;
  string customer_id = 2;
  string rzp_id = 3;
  repeated OrderItem order_items = 4;
  string address = 5;
  string pincode = 6;
  double checkout_total = 7;
  string currency = 8;
  bool is_paid = 9;
  bool is_delivered = 10;
}

message GetKeyResponse {
  string key = 1;
}

message PaymentSuccessRequest {}
message PaymentSuccessResponse {}
message PaymentFailureRequest {}
message PaymentFailureResponse {}
message PaymentCallbackResponse {}

message CreateOrderRequest {
  repeated OrderItem order_items = 1;
  string address = 2;
  string pincode = 3;
  string currency = 4;
}

message CreateOrderResponse {
  string id = 1;
  string rzp_id = 2;
  string customer_id = 3;
  repeated OrderItem order_items = 4;
  string address = 5;
  string pincode = 6;
  double checkout_total = 7;
  string currency = 8;
  bool is_paid = 9;
  bool is_delivered = 10;
}

message UpdateDeliveryAddressRequest {
  string id = 1;
  string address = 2;
}

message UpdateDeliveryAddressResponse {
  bool is_updated = 1;
}

message CancelOrderRequest {
  string id = 1;
}

message CancelOrderResponse {
  bool is_cancelled = 1;
}

service OrdersService {
  rpc GetKey(google.protobuf.Empty) returns (GetKeyResponse) {
    option (google.api.http) = {get: "/orders/key"};
  }

  rpc PaymentSuccess(PaymentSuccessRequest) returns (PaymentSuccessResponse) {
    option (google.api.http) = {get: "/orders/payment-success"};
  }

  rpc PaymentFailure(PaymentFailureRequest) returns (PaymentFailureResponse) {
    option (google.api.http) = {get: "/orders/payment-failure"};
  }

  rpc PaymentCallback(google.protobuf.Empty) returns (PaymentCallbackResponse) {
    option (google.api.http) = {get: "/orders/payment-callback"};
  }

  rpc GetOrderByID(GetOrderByIDRequest) returns (GetOrderByIDResponse) {
    option (google.api.http) = {get: "/orders/{id}"};
  }

  rpc GetOrdersByCustomerID(GetOrdersByCustomerIDRequest) returns (stream GetOrdersByCustomerIDResponse) {
    option (google.api.http) = {get: "/orders/customer/{customer_id}"};
  }

  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {
    option (google.api.http) = {
      post: "/orders"
      body: "*"
    };
  }

  rpc UpdateDeliveryAddress(UpdateDeliveryAddressRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/orders/{id}/delivery-address"
      body: "*"
    };
  }

  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse) {
    option (google.api.http) = {delete: "/orders/{id}"};
  }
}
