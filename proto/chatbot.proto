syntax = "proto3";

package chatbot;

message ChatRequest {
  string message = 1;
}

message ChatResponse {
  string response = 1;
}

message GenerateDescriptionRequest {
  string product_name = 1;
  double product_price = 2;
  string product_category = 3;
  repeated string tags = 4;
}

message GenerateDescriptionResponse {
  string response = 1;
}

service ChatbotService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc GenerateDescription(GenerateDescriptionRequest) returns (GenerateDescriptionResponse);
}
